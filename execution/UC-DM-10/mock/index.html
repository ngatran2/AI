<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý hãng bay - LAMS Mock</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;display:flex;min-height:100vh}
.sidebar{width:220px;background:#1a1a2e;color:#fff;padding:20px 0}
.sidebar h2{padding:0 20px;font-size:14px;color:#888;margin-bottom:10px}
.sidebar a{display:block;padding:10px 20px;color:#ccc;text-decoration:none;font-size:13px}
.sidebar a.active{background:#16213e;color:#4fc3f7;border-left:3px solid #4fc3f7}
.main{flex:1;padding:24px}
.breadcrumb{font-size:12px;color:#888;margin-bottom:16px}
.breadcrumb span:last-child{color:#333;font-weight:600}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.toolbar h1{font-size:18px;color:#1a1a2e}
.btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;transition:.2s}
.btn-primary{background:#4fc3f7;color:#fff}.btn-primary:hover{background:#039be5}
.btn-secondary{background:#e0e0e0;color:#333}
.btn-danger{background:#ef5350;color:#fff}
.btn-reset{background:transparent;color:#4fc3f7;border:1px solid #4fc3f7}
table{width:100%;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.1)}
th{background:#fafafa;padding:12px;text-align:left;font-size:13px;color:#666;border-bottom:2px solid #eee}
td{padding:10px 12px;border-bottom:1px solid #f0f0f0;font-size:13px}
tr:hover{background:#f8f9ff}
.actions button{margin-right:6px;padding:4px 8px;font-size:11px;border:1px solid #ddd;border-radius:4px;cursor:pointer;background:#fff}
.actions .edit{color:#ff9800;border-color:#ff9800}
.actions .delete{color:#ef5350;border-color:#ef5350}
.pagination{display:flex;justify-content:space-between;align-items:center;padding:12px;font-size:12px;color:#888}
.pagination button{padding:4px 12px;border:1px solid #ddd;background:#fff;border-radius:4px;cursor:pointer;font-size:12px}
.pagination button:disabled{opacity:.4;cursor:not-allowed}
.pagination .active-page{background:#4fc3f7;color:#fff;border-color:#4fc3f7}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:100;justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px;width:420px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal h2{font-size:16px;margin-bottom:16px;color:#1a1a2e}
.modal .close{float:right;cursor:pointer;font-size:18px;color:#999}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;margin-bottom:4px;color:#555}
.form-group label .req{color:red}
.form-group input{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px}
.form-group input.error{border-color:red}
.form-group .err-msg{color:red;font-size:11px;margin-top:2px;display:none}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.toast{position:fixed;bottom:20px;left:20px;padding:12px 20px;border-radius:8px;color:#fff;font-size:13px;z-index:200;display:none;max-width:400px;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.toast.success{background:#43a047;display:block}
.toast.error{background:#e53935;display:block}
.confirm-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:150;justify-content:center;align-items:center}
.confirm-overlay.show{display:flex}
.confirm-box{background:#fff;padding:24px;border-radius:12px;width:360px;text-align:center}
.confirm-box p{margin-bottom:16px;font-size:14px}
.filter-bar{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.filter-bar input{padding:6px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;width:200px}
.chip{display:inline-flex;align-items:center;background:#e3f2fd;color:#1565c0;padding:2px 10px;border-radius:12px;font-size:11px;margin-right:4px}
.chip .x{margin-left:6px;cursor:pointer}
#filterChips{margin-bottom:8px}
.empty-state{text-align:center;padding:40px;color:#999;font-size:14px}
</style>
</head>
<body>
<div class="sidebar">
<h2>Hệ thống</h2>
<a href="#" class="active">Quản lý hãng bay</a>
<a href="#" id="nav-card-type">Quản lý loại thẻ</a>
<a href="#">Quản lý sân bay</a>
</div>
<div class="main">
<div class="breadcrumb"><span>Hệ thống</span> / <span>Quản lý hãng bay</span></div>
<div class="toolbar">
<h1>Quản lý hãng bay</h1>
<button class="btn btn-primary" id="btnAdd" onclick="openAddModal()">Thêm mới</button>
</div>
<div class="filter-bar">
<input type="text" id="searchBox" placeholder="Tìm kiếm theo mã..." onkeydown="if(event.key==='Enter')doSearch()">
<button class="btn btn-reset" id="btnResetFilter" onclick="resetFilter()">Đặt lại bộ lọc</button>
</div>
<div id="filterChips"></div>
<table><thead><tr><th>Mã</th><th>Tên</th><th>Thao tác</th></tr></thead><tbody id="tableBody"></tbody></table>
<div class="pagination">
<span id="totalInfo">Tổng: 0</span>
<div>
<button id="btnPrev" onclick="changePage(-1)" disabled>Previous</button>
<button id="btnPageNum" class="active-page">1</button>
<button id="btnNext" onclick="changePage(1)">Next</button>
</div>
</div>
</div>

<div class="modal-overlay" id="addModal">
<div class="modal">
<span class="close" onclick="closeAddModal()">&times;</span>
<h2 id="modalTitle">Thêm mới hãng bay</h2>
<div class="form-group">
<label>Mã hãng bay <span class="req">*</span></label>
<input type="text" id="inputCode" maxlength="10">
<div class="err-msg" id="errCode"></div>
</div>
<div class="form-group">
<label>Tên hãng bay <span class="req">*</span></label>
<input type="text" id="inputName" maxlength="100">
<div class="err-msg" id="errName"></div>
</div>
<div class="modal-actions">
<button class="btn btn-secondary" id="btnRestore" onclick="restoreModal()">Khôi phục</button>
<button class="btn btn-primary" onclick="saveAirline()">Lưu</button>
</div>
</div>
</div>

<div class="confirm-overlay" id="confirmModal">
<div class="confirm-box">
<p id="confirmText">Bạn có chắc chắn muốn xóa?</p>
<div style="display:flex;gap:8px;justify-content:center">
<button class="btn btn-secondary" onclick="closeConfirm()">Hủy</button>
<button class="btn btn-danger" onclick="confirmDelete()">Xác nhận</button>
</div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
let airlines=[
{code:'VN',name:'Vietnam Airlines',linked:true},
{code:'VJ',name:'VietJet Air',linked:false},
{code:'QH',name:'Bamboo Airways',linked:false},
{code:'BL',name:'Pacific Airlines',linked:false},
{code:'SQ',name:'Singapore Airlines',linked:false},
{code:'TG',name:'Thai Airways',linked:false},
{code:'CX',name:'Cathay Pacific',linked:false},
{code:'JL',name:'Japan Airlines',linked:false},
{code:'KE',name:'Korean Air',linked:false},
{code:'NH',name:'ANA',linked:false},
{code:'MH',name:'Malaysia Airlines',linked:false},
{code:'GA',name:'Garuda Indonesia',linked:false},
{code:'PR',name:'Philippine Airlines',linked:false},
{code:'BR',name:'EVA Air',linked:false},
{code:'CI',name:'China Airlines',linked:false},
{code:'CZ',name:'China Southern',linked:false},
{code:'MU',name:'China Eastern',linked:false},
{code:'CA',name:'Air China',linked:false},
{code:'EK',name:'Emirates',linked:false},
{code:'QR',name:'Qatar Airways',linked:false},
{code:'BA',name:'British Airways',linked:false},
{code:'LH',name:'Lufthansa',linked:false},
{code:'AF',name:'Air France',linked:false},
{code:'KL',name:'KLM',linked:false},
{code:'AA',name:'American Airlines',linked:false}
];
let currentPage=1,perPage=20,editingIdx=-1,deleteIdx=-1;
let filteredAirlines=[...airlines];
let currentRole='admin'; // admin | view
let searchTerm='';

function render(){
  const start=(currentPage-1)*perPage;
  const pageData=filteredAirlines.slice(start,start+perPage);
  const tbody=document.getElementById('tableBody');
  if(pageData.length===0){
    tbody.innerHTML='<tr><td colspan="3"><div class="empty-state">Không có dữ liệu</div></td></tr>';
  } else {
    tbody.innerHTML=pageData.map((a,i)=>`<tr>
      <td>${a.code}</td><td>${a.name}</td>
      <td class="actions">${currentRole==='admin'?`
        <button class="edit" onclick="openEditModal(${start+i})">Sửa</button>
        <button class="delete" onclick="openDeleteConfirm(${start+i})">Xóa</button>`:''}
      </td></tr>`).join('');
  }
  document.getElementById('totalInfo').textContent='Tổng: '+filteredAirlines.length;
  const totalPages=Math.max(1,Math.ceil(filteredAirlines.length/perPage));
  document.getElementById('btnPrev').disabled=currentPage<=1;
  document.getElementById('btnNext').disabled=currentPage>=totalPages;
  document.getElementById('btnPageNum').textContent=currentPage;
  if(currentRole==='view') document.getElementById('btnAdd').style.display='none';
  else document.getElementById('btnAdd').style.display='';
}

function changePage(d){currentPage+=d;render()}
function doSearch(){
  searchTerm=document.getElementById('searchBox').value.trim();
  if(searchTerm){
    filteredAirlines=airlines.filter(a=>a.code.toLowerCase().includes(searchTerm.toLowerCase())||a.name.toLowerCase().includes(searchTerm.toLowerCase()));
    document.getElementById('filterChips').innerHTML=`<span class="chip">${searchTerm}<span class="x" onclick="resetFilter()">×</span></span>`;
  } else {
    filteredAirlines=[...airlines];
    document.getElementById('filterChips').innerHTML='';
  }
  currentPage=1;render();
}
function resetFilter(){
  searchTerm='';document.getElementById('searchBox').value='';
  document.getElementById('filterChips').innerHTML='';
  filteredAirlines=[...airlines];currentPage=1;render();
}

function openAddModal(){
  editingIdx=-1;
  document.getElementById('modalTitle').textContent='Thêm mới hãng bay';
  document.getElementById('inputCode').value='';document.getElementById('inputCode').readOnly=false;
  document.getElementById('inputName').value='';
  clearErrors();
  document.getElementById('addModal').classList.add('show');
}
function openEditModal(idx){
  editingIdx=idx;
  document.getElementById('modalTitle').textContent='Chỉnh sửa hãng bay';
  document.getElementById('inputCode').value=airlines[idx].code;
  document.getElementById('inputCode').readOnly=true;
  document.getElementById('inputName').value=airlines[idx].name;
  clearErrors();
  document.getElementById('addModal').classList.add('show');
}
function closeAddModal(){document.getElementById('addModal').classList.remove('show')}
function restoreModal(){
  document.getElementById('inputCode').value='';
  document.getElementById('inputName').value='';
  clearErrors();
  closeAddModal();
}
function clearErrors(){
  ['errCode','errName'].forEach(id=>{document.getElementById(id).style.display='none'});
  ['inputCode','inputName'].forEach(id=>{document.getElementById(id).classList.remove('error')});
}
function showError(inputId,errId,msg){
  document.getElementById(inputId).classList.add('error');
  const e=document.getElementById(errId);e.textContent=msg;e.style.display='block';
}
function saveAirline(){
  clearErrors();
  let code=document.getElementById('inputCode').value.trim();
  let name=document.getElementById('inputName').value.trim();
  let hasErr=false;
  if(!code){showError('inputCode','errCode','Mã hãng bay là trường bắt buộc');hasErr=true}
  if(!name){showError('inputName','errName','Tên hãng bay là trường bắt buộc');hasErr=true}
  if(hasErr)return;
  if(editingIdx===-1){
    if(airlines.find(a=>a.code.toUpperCase()===code.toUpperCase())){
      showToast('error','Thất bại','Mã hãng bay đã tồn tại trong hệ thống.');return;
    }
    airlines.push({code,name,linked:false});
    filteredAirlines=[...airlines];
    showToast('success','Thành công',`Thêm mới [${code} - ${name}] thành công.`);
  } else {
    airlines[editingIdx].name=name;
    filteredAirlines=[...airlines];
    showToast('success','Thành công',`Cập nhật [${airlines[editingIdx].code} - ${name}] thành công.`);
  }
  closeAddModal();if(searchTerm)doSearch();else render();
}
function openDeleteConfirm(idx){deleteIdx=idx;document.getElementById('confirmModal').classList.add('show')}
function closeConfirm(){document.getElementById('confirmModal').classList.remove('show');deleteIdx=-1}
function confirmDelete(){
  if(deleteIdx>=0){
    const a=airlines[deleteIdx];
    if(a.linked){
      showToast('error','Thất bại','Không thể xóa khi hãng bay và loại thẻ liên quan đang được sử dụng.');
    } else {
      const code=a.code,name=a.name;
      airlines.splice(deleteIdx,1);
      filteredAirlines=[...airlines];
      showToast('success','Thành công',`Xóa [${code} - ${name}] và các loại thẻ liên quan thành công.`);
      if(searchTerm)doSearch();else render();
    }
  }
  closeConfirm();
}
function showToast(type,title,msg){
  const t=document.getElementById('toast');t.className='toast '+type;t.innerHTML=`<strong>${title}</strong><br>${msg}`;
  setTimeout(()=>{t.className='toast'},5000);
}
function switchRole(role){currentRole=role;render()}
render();
</script>
</body>
</html>
